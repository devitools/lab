name: build floofy.exe

on:
  push:
    tags:
      - 'v*'
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install deps
        working-directory: client
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: build floofy.exe
        working-directory: client
        run: |
          pyinstaller --onefile --windowed --name floofy --collect-all websockets app.py

      - name: smoke test (import only)
        working-directory: client
        run: |
          dir dist
          if (-not (Test-Path dist\floofy.exe)) { exit 1 }
          (Get-Item dist\floofy.exe).Length

      - uses: actions/upload-artifact@v4
        with:
          name: floofy-windows
          path: client/dist/floofy.exe
          retention-days: 30

      - name: release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/floofy.exe
          generate_release_notes: true

      - name: rolling latest release (main pushes)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: floofy.exe (rolling latest)
          files: client/dist/floofy.exe
          make_latest: true
          body: |
            Build automático do último commit em `main`.
            Pra versões com tag estável veja outras releases.
