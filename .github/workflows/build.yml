name: build lab

on:
  push:
    tags:
      - 'v*'
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: lab-windows
            artifact_path: client/dist/lab.exe
          - os: macos-latest
            artifact_name: lab-macos
            artifact_path: client/lab-macos.zip
          - os: ubuntu-latest
            artifact_name: lab-linux
            artifact_path: client/lab-linux.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install deps
        working-directory: client
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: build windows
        if: matrix.os == 'windows-latest'
        working-directory: client
        run: pyinstaller --onefile --windowed --name lab --collect-all websockets --collect-all certifi --collect-all sv_ttk app.py

      - name: upload unsigned exe (signpath input)
        id: unsigned-exe
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: lab-windows-unsigned
          path: client/dist/lab.exe
          retention-days: 1

      - name: sign windows via SignPath
        if: matrix.os == 'windows-latest' && vars.SIGNPATH_ENABLED == 'true'
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_SLUG }}
          github-artifact-id: ${{ steps.unsigned-exe.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: client/dist

      - name: signpath disabled note
        if: matrix.os == 'windows-latest' && vars.SIGNPATH_ENABLED != 'true'
        shell: bash
        run: echo "::warning::SIGNPATH_ENABLED!='true' — shipping unsigned .exe (SmartScreen will warn). Set repo Variable SIGNPATH_ENABLED=true after SignPath project is approved."

      - name: build macos
        if: matrix.os == 'macos-latest'
        working-directory: client
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          pyinstaller --windowed --name lab \
            --osx-bundle-identifier com.devitools.lab \
            --collect-all websockets --collect-all certifi --collect-all sv_ttk \
            app.py

          if [ -n "$APPLE_SIGNING_IDENTITY" ] && [ -n "$APPLE_CERTIFICATE" ]; then
            echo "::group::codesign"
            echo "$APPLE_CERTIFICATE" | base64 -d > /tmp/cert.p12
            KEYCHAIN_PWD=$(uuidgen)
            security create-keychain -p "$KEYCHAIN_PWD" build.keychain
            security set-keychain-settings -lut 21600 build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PWD" build.keychain
            security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" build.keychain

            codesign --deep --force --verify --verbose --timestamp \
              --options runtime \
              --entitlements entitlements.plist \
              --sign "$APPLE_SIGNING_IDENTITY" \
              dist/lab.app

            codesign --verify --deep --strict --verbose=2 dist/lab.app
            echo "::endgroup::"

            if [ -n "$APPLE_API_KEY_CONTENT" ] && [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_ISSUER" ]; then
              echo "::group::notarize"
              mkdir -p "$HOME/private_keys"
              KEY_PATH="$HOME/private_keys/AuthKey_${APPLE_API_KEY}.p8"
              echo "$APPLE_API_KEY_CONTENT" > "$KEY_PATH"

              ditto -c -k --sequesterRsrc --keepParent dist/lab.app /tmp/lab-notarize.zip
              if xcrun notarytool submit /tmp/lab-notarize.zip \
                  --key "$KEY_PATH" \
                  --key-id "$APPLE_API_KEY" \
                  --issuer "$APPLE_API_ISSUER" \
                  --wait; then
                xcrun stapler staple dist/lab.app
              else
                echo "::warning::Notarization failed — shipping signed-only build (likely expired Apple Developer agreement at https://appstoreconnect.apple.com)"
              fi
              echo "::endgroup::"
            else
              echo "::warning::Notarize secrets missing — signed but not notarized (Gatekeeper still blocks)"
            fi
          else
            echo "::warning::Signing secrets missing — unsigned build (Gatekeeper blocks)"
          fi

          cd dist && ditto -c -k --sequesterRsrc --keepParent lab.app ../lab-macos.zip
          ls -la ../lab-macos.zip

      - name: build linux (AppImage)
        if: matrix.os == 'ubuntu-latest'
        working-directory: client
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk librsvg2-bin desktop-file-utils

          pyinstaller --onefile --name lab \
            --collect-all websockets --collect-all certifi --collect-all sv_ttk \
            app.py

          APPDIR="$PWD/AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp dist/lab "$APPDIR/usr/bin/lab"

          rsvg-convert -w 256 -h 256 assets/lab.svg -o "$APPDIR/lab.png"
          cp assets/lab.desktop "$APPDIR/lab.desktop"

          cat > "$APPDIR/AppRun" <<'SH'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/lab" "$@"
          SH
          chmod +x "$APPDIR/AppRun"

          curl -fsSL -o /tmp/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          ( cd /tmp && ./appimagetool --appimage-extract >/dev/null )

          ARCH=x86_64 /tmp/squashfs-root/AppRun --no-appstream "$APPDIR" lab-linux.AppImage
          ls -la lab-linux.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30

  release:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: list artifacts
        run: ls -laR artifacts

      - name: rolling latest (main pushes)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: lab (rolling latest)
          files: |
            artifacts/lab-windows/lab.exe
            artifacts/lab-macos/lab-macos.zip
            artifacts/lab-linux/lab-linux.AppImage
          make_latest: true
          body: |
            Automatic build from the latest commit on `main`.

            - **Windows**: download `lab.exe`
            - **macOS** (Apple Silicon): download `lab-macos.zip`, unzip, move `lab.app` to Applications. If the build is signed + notarized, double-click to open. Otherwise right-click → Open (Gatekeeper blocks unsigned binaries).
            - **Linux**: download `lab-linux.AppImage`, `chmod +x lab-linux.AppImage`, then `./lab-linux.AppImage`.

      - name: tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/lab-windows/lab.exe
            artifacts/lab-macos/lab-macos.zip
            artifacts/lab-linux/lab-linux.AppImage
          generate_release_notes: true
